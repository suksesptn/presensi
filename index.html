<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presensi Tambahan - SMA PU Albayan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { padding: 15px; background-color: #f4f7f6; font-family: sans-serif; }
    .card { max-width: 500px; margin: auto; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .header-p { background: #0d6efd; color: white; padding: 20px; border-radius: 15px 15px 0 0; text-align: center; }
    .siswa-row { margin-bottom: 12px; display: flex; gap: 8px; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .btn-remove { border-radius: 8px; }
    label { font-weight: 600; color: #444; margin-bottom: 5px; }
  </style>
</head>
<body>

  <div class="card">
    <div class="header-p">
      <h5 class="m-0">Presensi Intensif PTN</h5>
      <small>SMA PU Albayan</small>
    </div>
    
    <div class="card-body p-4">
      <div class="mb-3">
        <label>Tanggal Kegiatan <span class="text-danger">*</span></label>
        <input type="date" id="tanggal" class="form-control" required>
      </div>

      <div class="mb-3">
        <label>Nama Lengkap Guru + Gelar <span class="text-danger">*</span></label>
        <select id="guru" class="form-select" required>
          <option value="" disabled selected>Memuat daftar guru...</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Jenis Kegiatan <span class="text-danger">*</span></label>
        <select id="kegiatan" class="form-select" required>
          <option value="" disabled selected>Pilih jenis kegiatan...</option>
          <option value="UJIAN MANDIRI">UJIAN MANDIRI</option>
          <option value="Tambahan Sore/Malam">Tambahan Sore/Malam</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Jumlah JP <span class="text-danger">*</span></label>
        <input type="number" id="jp" class="form-control" value="2" required>
      </div>

      <hr class="my-4">
      <label>Daftar Siswa <span class="text-danger">*</span></label>
      <div id="container-siswa">
        <div class="siswa-row">
          <input list="list-siswa" class="form-control input-siswa" placeholder="Ketik nama siswa...">
        </div>
      </div>
      
      <button class="btn btn-outline-primary btn-sm w-100 mt-2" onclick="tambahBaris()">+ Tambah Baris Siswa</button>
      
      <datalist id="list-siswa"></datalist>

      <button class="btn btn-success w-100 mt-4 py-2" onclick="kirimData()" id="btnSubmit">SIMPAN PRESENSI</button>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzhBQQXxLtCLbQ61IuQZMDq0SIYCGJ5zDQYQRPQU989jRO8pz9XPHCg9xFSdMRY4AOj/exec";

    document.getElementById('tanggal').valueAsDate = new Date();

    fetch(APPS_SCRIPT_URL)
      .then(response => response.json())
      .then(data => {
        // Mengisi datalist siswa (siswa tetap bisa diketik untuk memudahkan pencarian)
        const sList = document.getElementById('list-siswa');
        if(data.siswa) {
          data.siswa.forEach(s => { sList.innerHTML += `<option value="${s}">`; });
        }
        
        // Mengisi select dropdown guru
        const guruSelect = document.getElementById('guru');
        if(data.guru) {
          guruSelect.innerHTML = '<option value="" disabled selected>Pilih nama guru dari daftar...</option>';
          data.guru.forEach(g => { 
            guruSelect.innerHTML += `<option value="${g}">${g}</option>`; 
          });
        } else {
          guruSelect.innerHTML = '<option value="" disabled selected>Gagal memuat daftar guru</option>';
        }
      })
      .catch(error => {
        console.error('Gagal mengambil data dropdown:', error);
        document.getElementById('guru').innerHTML = '<option value="" disabled selected>Gagal memuat koneksi</option>';
      });

    function tambahBaris() {
      const container = document.getElementById('container-siswa');
      const div = document.createElement('div');
      div.className = 'siswa-row';
      div.innerHTML = `
        <input list="list-siswa" class="form-control input-siswa" placeholder="Nama siswa...">
        <button class="btn btn-danger btn-sm btn-remove" onclick="this.parentElement.remove()">✕</button>
      `;
      container.appendChild(div);
    }

    function kirimData() {
      const tanggal = document.getElementById('tanggal').value;
      const guru = document.getElementById('guru').value; 
      const kegiatan = document.getElementById('kegiatan').value; 
      const jp = document.getElementById('jp').value;

      if(!tanggal || !guru || !kegiatan || !jp) {
        alert("Mohon lengkapi semua isian (Tanggal, Nama Guru, Kegiatan, dan JP)!");
        return;
      }

      const siswas = Array.from(document.querySelectorAll('.input-siswa'))
                          .map(input => input.value.trim())
                          .filter(val => val !== "");

      if (siswas.length === 0) {
        alert("Mohon isi minimal satu nama siswa.");
        return;
      }

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Menyimpan...';

      const payload = { tanggal, guru, kegiatan, jp, siswa: siswas };

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8', 
        },
        body: JSON.stringify(payload)
      })
      .then(response => response.json())
      .then(result => {
        if(result.status === "success") {
          alert(result.message);
          location.reload(); 
        } else {
          alert("Gagal menyimpan: " + result.message);
          btn.disabled = false;
          btn.innerText = "SIMPAN PRESENSI";
        }
      })
      .catch(error => {
        alert("Terjadi kesalahan jaringan atau CORS: " + error);
        btn.disabled = false;
        btn.innerText = "SIMPAN PRESENSI";
      });
    }
  </script>
</body>
</html>
