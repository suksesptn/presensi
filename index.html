<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presensi Tambahan - SMA PU Albayan</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { padding: 15px; background-color: #f4f7f6; font-family: sans-serif; }
    .card { max-width: 500px; margin: auto; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .header-p { background: #0d6efd; color: white; padding: 20px; border-radius: 15px 15px 0 0; text-align: center; }
    label { font-weight: 600; color: #444; margin-bottom: 5px; }
    .checkbox-container { max-height: 250px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 8px; padding: 10px; background: #fff; }
    .form-check { margin-bottom: 8px; }
    .siswa-manual-row { display: flex; gap: 8px; margin-top: 10px; }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div class="spinner-border text-primary mb-2"></div>
    <span>Memproses data...</span>
  </div>

  <div class="card">
    <div class="header-p">
      <h5 class="m-0">Presensi Intensif PTN</h5>
      <small>SMA PU Albayan</small>
    </div>
    
    <div class="card-body p-4">
      <div class="mb-3">
        <label for="tanggal">Tanggal Kegiatan <span class="text-danger">*</span></label>
        <input type="date" id="tanggal" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="guru">Nama Lengkap Guru + Gelar <span class="text-danger">*</span></label>
        <select id="guru" class="form-select" required>
          <option value="" disabled selected>Memuat daftar guru...</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="kegiatan">Jenis Kegiatan <span class="text-danger">*</span></label>
        <select id="kegiatan" class="form-select" required>
          <option value="" disabled selected>Pilih jenis kegiatan...</option>
          <option value="UJIAN MANDIRI">UJIAN MANDIRI</option>
          <option value="Tambahan Sore/Malam">Tambahan Sore/Malam</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="jp">Jumlah JP <span class="text-danger">*</span></label>
        <input type="number" id="jp" class="form-control" value="2" required>
      </div>

      <hr class="my-4">
      
      <div class="mb-3">
        <label for="kelas">Pilih Kelas <span class="text-danger">*</span></label>
        <select id="kelas" class="form-select" onchange="tampilkanSiswa()" required>
          <option value="" disabled selected>Memuat daftar kelas...</option>
        </select>
      </div>

      <label>Daftar Siswa (Ceklis yang hadir) <span class="text-danger">*</span></label>
      <div id="container-siswa" class="checkbox-container mb-3 text-muted">
        <em>Silakan pilih kelas terlebih dahulu...</em>
      </div>
      
      <label>Tambah Siswa Manual (Opsional)</label>
      <small class="d-block text-muted mb-2">Gunakan jika ada siswa lintas kelas yang hadir.</small>
      <div id="container-manual" class="mb-2"></div>
      <button class="btn btn-outline-primary btn-sm w-100" onclick="tambahBarisManual()">+ Tambah Siswa Manual</button>

      <button class="btn btn-success w-100 mt-4 py-2" onclick="kirimData()" id="btnSubmit">SIMPAN PRESENSI</button>
    </div>
  </div>

  <script>
    // URL Apps Script yang baru Bapak berikan
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxB7w3W-qbYFbwV1FUsf8yG_FXr2PqrcKh74l8bG6WCIYlWpW5ZhlddYPybXVHg5YVa/exec"; 
    
    let dataMasterSiswa = {}; 

    // Set tanggal hari ini secara otomatis
    document.getElementById('tanggal').valueAsDate = new Date();

    // 1. Ambil Data Guru dan Kelas saat halaman dimuat
    window.onload = function() {
      fetch(APPS_SCRIPT_URL)
        .then(response => response.json())
        .then(data => {
          if (data.status === "error") {
            alert("Gagal mengambil data: " + data.message);
            return;
          }

          // Isi Dropdown Guru
          const guruSelect = document.getElementById('guru');
          if(data.guru && data.guru.length > 0) {
            guruSelect.innerHTML = '<option value="" disabled selected>Pilih nama guru...</option>';
            data.guru.forEach(g => guruSelect.innerHTML += `<option value="${g}">${g}</option>`);
          }

          // Isi Dropdown Kelas
          const kelasSelect = document.getElementById('kelas');
          if(data.kelas && data.kelas.length > 0) {
            kelasSelect.innerHTML = '<option value="" disabled selected>Pilih kelas...</option>';
            data.kelas.forEach(k => kelasSelect.innerHTML += `<option value="${k}">${k}</option>`);
          }

          // Simpan data siswa ke variabel lokal
          if(data.siswa) {
            dataMasterSiswa = data.siswa;
          }
        })
        .catch(error => {
          console.error('Error:', error);
          alert("Koneksi gagal atau URL Apps Script salah/belum di-deploy sebagai 'Anyone'.");
        });
    };

    // 2. Fungsi untuk menampilkan daftar siswa berdasarkan kelas yang dipilih
    function tampilkanSiswa() {
      const kelasDipilih = document.getElementById('kelas').value;
      const containerSiswa = document.getElementById('container-siswa');
      
      containerSiswa.innerHTML = '';
      containerSiswa.classList.remove('text-muted');

      const daftarSiswa = dataMasterSiswa[kelasDipilih] || [];

      if(daftarSiswa.length === 0) {
        containerSiswa.innerHTML = '<em>Data siswa tidak ditemukan untuk kelas ini.</em>';
        return;
      }

      daftarSiswa.forEach((siswa, index) => {
        const idCheckbox = `chk_${index}`;
        containerSiswa.innerHTML += `
          <div class="form-check">
            <input class="form-check-input chk-siswa" type="checkbox" value="${siswa}" id="${idCheckbox}">
            <label class="form-check-label" for="${idCheckbox}">${siswa}</label>
          </div>
        `;
      });
    }

    // 3. Fungsi Tambah Baris Manual
    function tambahBarisManual() {
      const container = document.getElementById('container-manual');
      const div = document.createElement('div');
      div.className = 'siswa-manual-row';
      div.innerHTML = `
        <input type="text" class="form-control input-manual" placeholder="Ketik Nama Siswa...">
        <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">✕</button>
      `;
      container.appendChild(div);
    }

    // 4. Fungsi Kirim Data ke Google Sheets
    function kirimData() {
      const tanggal = document.getElementById('tanggal').value;
      const guru = document.getElementById('guru').value; 
      const kegiatan = document.getElementById('kegiatan').value; 
      const jp = document.getElementById('jp').value;
      const kelas = document.getElementById('kelas').value;

      if(!tanggal || !guru || !kegiatan || !jp || !kelas) {
        alert("Mohon lengkapi semua isian yang berbintang merah (*)");
        return;
      }

      // Ambil siswa dari checklist
      const siswaDiceklis = Array.from(document.querySelectorAll('.chk-siswa:checked')).map(cb => cb.value);
      
      // Ambil siswa dari input manual
      const siswaManual = Array.from(document.querySelectorAll('.input-manual'))
                               .map(input => input.value.trim())
                               .filter(val => val !== "");

      const semuaSiswa = [...siswaDiceklis, ...siswaManual];

      if (semuaSiswa.length === 0) {
        alert("Pilih atau ketik minimal satu nama siswa yang hadir.");
        return;
      }

      // Tampilkan Loading
      document.getElementById('loader').style.display = 'flex';
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;

      const payload = { tanggal, guru, kegiatan, jp, kelas, siswa: semuaSiswa };

      // Kirim menggunakan POST
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // Penting untuk Apps Script doPost
        cache: 'no-cache',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(() => {
        // Karena mode no-cors, kita anggap sukses jika tidak ada error jaringan
        alert("Data presensi berhasil dikirim!");
        location.reload(); 
      })
      .catch(error => {
        alert("Terjadi kesalahan: " + error);
        document.getElementById('loader').style.display = 'none';
        btn.disabled = false;
      });
    }
  </script>
</body>
</html>
